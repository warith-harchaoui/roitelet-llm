<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <title>Roitelet</title>
  <link rel="icon" type="image/png" href="/assets/roitelet.png">
  <!-- Self-hosted vendored assets so offline mode (a local-first value prop)
       works and there's no third-party JS supply chain. Refresh with
       scripts/vendor_web_assets.sh. -->
  <script src="/vendor/tailwindcss.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script>
    // Tailwind: every border-radius utility — including rounded-full —
    // resolves to 10px per design directive.
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','"SF Pro Text"','"SF Pro Display"','Inter','system-ui','sans-serif'],
            mono: ['ui-monospace','"SF Mono"','Menlo','Monaco','Consolas','monospace'],
          },
          colors: {
            sysblue: '#0a84ff',
            sysblueHover: '#0071e3',
          },
          borderRadius: {
            // Continuous 10px corner is the brand radius for cards, inputs,
            // bubbles. `full` stays at 9999px so circular icon/send buttons
            // (HIG pattern, esp. iMessage send) are actually circular.
            none: '0', sm: '10px', DEFAULT: '10px', md: '10px',
            lg: '10px', xl: '10px', '2xl': '10px', '3xl': '10px',
            full: '9999px',
          },
        },
      },
    };
  </script>
  <style>
    /* Refine the system-font stack & smooth scrolling — Apple-style. */
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
    /* Hide scrollbars but keep functionality (HIG: chrome should yield to content). */
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
    @media (prefers-color-scheme: dark) {
      .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    }
    /* Subtle assistant typing indicator. */
    @keyframes thinking { 0%, 80%, 100% { opacity: 0.2 } 40% { opacity: 1 } }
    .thinking-dot { animation: thinking 1.4s infinite ease-in-out both; }
    .thinking-dot:nth-child(2) { animation-delay: 0.16s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.32s; }
    /* Auto-growing textarea (caps via max-height in JS). */
    textarea { field-sizing: content; }
    /* Polish prose rendering of assistant messages. */
    .prose-msg p { margin: 0 0 0.75rem 0; }
    .prose-msg p:last-child { margin-bottom: 0; }
    .prose-msg pre { background: rgba(0,0,0,0.04); padding: 12px 14px; border-radius: 10px; overflow-x: auto; font-size: 13px; }
    .prose-msg code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.9em; }
    .prose-msg p code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 10px; }
    @media (prefers-color-scheme: dark) {
      .prose-msg pre { background: rgba(255,255,255,0.06); }
      .prose-msg p code { background: rgba(255,255,255,0.08); }
    }
    .prose-msg ul, .prose-msg ol { padding-left: 1.4em; margin: 0 0 0.75rem 0; }
    .prose-msg li { margin-bottom: 0.25rem; }
    .prose-msg h1, .prose-msg h2, .prose-msg h3 { font-weight: 600; margin: 1rem 0 0.5rem; }
    /* HIG keyboard-shortcut glyphs: rendered tight, no `+` separator. */
    kbd.kbd { font-family: inherit; font-weight: 600; letter-spacing: 0.02em; }
    /* HIG accessibility: honor system "reduce motion" — kill transitions and
       animations rather than half-applying them. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="h-full bg-white dark:bg-[#1c1c1e] text-gray-900 dark:text-gray-100 font-sans">

  <div class="flex h-full">

    <!-- ───── Sidebar ─────────────────────────────────────────────── -->
    <aside class="hidden md:flex md:w-[260px] flex-col border-r border-gray-200/80 dark:border-white/[0.08] bg-[#fbfbfd]/80 dark:bg-black/30 backdrop-blur-xl">
      <div class="px-3 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2 px-2">
          <img src="/assets/roitelet.png" alt="Roitelet" width="22" height="22" class="rounded-[10px]">
          <span class="text-[13px] font-semibold tracking-tight">Roitelet</span>
        </div>
        <button id="newChatBtn" class="w-11 h-11 rounded-full flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/10 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/50" title="New chat — ⌘N" aria-label="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div id="conversationList" class="flex-1 overflow-y-auto scrollbar-thin px-2 py-1 space-y-0.5">
        <!-- conversation entries injected here -->
      </div>

      <div class="border-t border-gray-200/80 dark:border-white/[0.08] p-2">
        <button id="settingsBtn" class="w-full flex items-center gap-2.5 px-2.5 py-2 text-[13px] text-gray-700 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </div>
    </aside>

    <!-- ───── Main pane ───────────────────────────────────────────── -->
    <main class="flex-1 flex flex-col min-w-0 relative">

      <!-- Sticky header with subtle translucency. -->
      <header class="sticky top-0 z-10 h-12 px-5 flex items-center justify-between bg-white/70 dark:bg-black/30 backdrop-blur-xl border-b border-gray-200/80 dark:border-white/[0.08]">
        <div class="flex items-center gap-2 min-w-0">
          <button id="mobileSidebarBtn" class="md:hidden w-11 h-11 rounded-full flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/50" aria-label="Open menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <h1 id="conversationTitle" class="text-[14px] font-semibold tracking-tight truncate">New chat</h1>
        </div>
        <div class="flex items-center gap-1.5 text-[11px] text-gray-500 dark:text-gray-400">
          <span id="statusDot" class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <span id="statusText">Ready</span>
        </div>
      </header>

      <!-- Messages list. -->
      <div id="messages" class="flex-1 overflow-y-auto scrollbar-thin">
        <div id="messagesInner" class="max-w-3xl mx-auto px-4 sm:px-6 py-8 space-y-4">
          <div id="welcome" class="text-center py-24">
            <img src="/assets/roitelet.png" alt="Roitelet" width="72" height="72" class="mx-auto mb-5 rounded-[10px] shadow-lg">
            <h2 class="text-[22px] font-semibold tracking-tight">Ask any question.</h2>
            <p class="text-[14px] text-gray-500 dark:text-gray-400 mt-2 max-w-md mx-auto leading-relaxed">Three frontier models answer in parallel. A local model picks the best.</p>
          </div>
        </div>
      </div>

      <!-- Composer. Sticky, translucent, like iMessage. -->
      <div class="border-t border-gray-200/80 dark:border-white/[0.08] bg-white/60 dark:bg-black/30 backdrop-blur-xl">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-3.5">
          <div id="attachmentChips" class="hidden flex-wrap gap-1.5 mb-2"></div>
          <form id="composer" class="flex items-end gap-2.5">
            <button type="button" id="attachBtn" title="Attach audio, image, or PDF"
              class="shrink-0 w-11 h-11 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:text-sysblue dark:hover:text-sysblue hover:bg-black/5 dark:hover:bg-white/10 active:scale-95 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/50">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input id="fileInput" type="file" multiple accept="audio/*,image/*,application/pdf" class="hidden">
            <div class="flex-1 border border-gray-300/80 dark:border-white/[0.12] bg-white dark:bg-[#2c2c2e] focus-within:border-sysblue dark:focus-within:border-sysblue focus-within:ring-2 focus-within:ring-sysblue/20 transition-all">
              <textarea id="prompt" rows="1" placeholder="Message Roitelet…"
                class="w-full resize-none bg-transparent px-4 py-3 text-[15px] leading-[1.4] focus:outline-none placeholder-gray-400 max-h-[200px]"></textarea>
            </div>
            <button type="submit" id="sendBtn" aria-label="Send"
              class="shrink-0 w-11 h-11 rounded-full bg-sysblue hover:bg-sysblueHover text-white flex items-center justify-center shadow-sm active:scale-95 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/60 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
              <svg id="sendIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
              <span id="sendSpinner" class="hidden w-4 h-4 rounded-full border-2 border-white/30 border-t-white animate-spin"></span>
            </button>
          </form>
          <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-2 text-center select-none">
            <kbd class="kbd">⌘↵</kbd> send · <kbd class="kbd">⌘N</kbd> new chat
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- ───── Settings sheet (Apple-style centered modal on desktop, bottom sheet on mobile) ─────────────── -->
  <div id="settingsSheet" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm transition-opacity" id="settingsOverlay"></div>
    <div class="absolute inset-x-0 bottom-0 md:inset-0 md:flex md:items-center md:justify-center md:p-6">
      <div class="bg-white dark:bg-[#1c1c1e] shadow-2xl w-full md:max-w-lg max-h-[90vh] md:max-h-[80vh] flex flex-col overflow-hidden">
        <div class="px-5 py-3.5 border-b border-gray-200 dark:border-white/[0.08] flex items-center justify-between">
          <h2 class="text-[15px] font-semibold tracking-tight">Settings</h2>
          <button id="closeSettingsBtn" class="w-11 h-11 rounded-full flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/50" aria-label="Close settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <form id="settingsForm" class="flex-1 overflow-y-auto scrollbar-thin px-5 py-4 space-y-4">
          <!-- injected by JS -->
        </form>
        <div class="px-5 py-3 border-t border-gray-200 dark:border-white/[0.08] flex justify-end gap-2">
          <button type="button" id="cancelSettingsBtn" class="min-h-[36px] px-4 py-1.5 text-[13px] font-medium hover:bg-black/5 dark:hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/50">Cancel</button>
          <button type="submit" form="settingsForm" class="min-h-[36px] px-4 py-1.5 text-[13px] font-semibold bg-sysblue text-white hover:bg-sysblueHover focus:outline-none focus-visible:ring-2 focus-visible:ring-sysblue/60">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast (errors / success). -->
  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-black/85 dark:bg-white/95 text-white dark:text-black text-[13px] px-4 py-2 shadow-xl backdrop-blur-md">
      <span id="toastText"></span>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
