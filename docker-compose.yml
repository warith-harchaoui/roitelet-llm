services:
  roitelet:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: roitelet:latest
    container_name: roitelet
    ports:
      # Roitelet exposes a single port (FastAPI serves the JSON API and
      # the static SPA on the same listener). No Streamlit; no second
      # port required.
      - "${ROITELET_APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Ensure Ollama points to the host machine when running inside Docker.
      LOCAL_LLM_BASE_URL: "${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}"
    volumes:
      # Persist conversations, telemetry, Elo state, runtime settings,
      # generated images, and the personal-mode inbox/wiki.
      - roitelet_data:/app/data
    restart: unless-stopped
    # Ping the dedicated /healthz endpoint instead of the static SPA so
    # an OK status genuinely reflects the API being reachable rather
    # than just the static mount answering.
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    # Allow the container to reach Ollama running on the host (macOS / Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  roitelet_data:
    driver: local
